<div id="lobby">
  <div class="lobbyCard">
    <div class="lobbyTitle">Lobby</div>
    <div id="lobbyPlayers"></div>
    <div class="lobbyRow">
      <div class="lobbyMapRow">
        <label class="controlLabel" for="mapLobby">Map</label>
        <select id="mapLobby" class="pill">
          <option value="arena">Arena (Default)</option>
          <option value="mansion">Mansion (CS style)</option>
        </select>
      </div>
      <button id="startBtn" type="button" aria-label="Start round" title="Start">Start</button>
      <div id="waitMsg"></div>
    </div>
    <div class="lobbyHint">Tip: left stick moves, right pad looks. Tap 🔫 to pick a weapon.</div>
  </div>
</div>

<div id="respawn">
  <div id="respawnText">Respawning…</div>
</div>
