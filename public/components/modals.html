<div id="scoreModal">
  <div id="scoreModalInner">
    <div class="scoreModalHeader">
      <div class="scoreModalTitle">SCOREBOARD</div>
      <button id="btnScoreClose">Close</button>
    </div>
    <div id="scoreboardBody"></div>
  </div>
</div>

<div id="weaponModal">
  <div id="weaponModalInner">
    <div class="wm-header">
      <div class="wm-titleWrap">
        <div class="wm-title">Pick Weapon</div>
        <div class="wm-hint">Tap a weapon • Tap outside to close</div>
      </div>
      <button class="wm-close" id="weaponModalClose" type="button" aria-label="Close weapon picker" title="Close">✕</button>
    </div>
    <div class="wm-grid">
      <button class="wm-opt" type="button" data-weapon="rifle">🔫 Rifle</button>
      <button class="wm-opt" type="button" data-weapon="shotgun">💥 Shotgun</button>
      <button class="wm-opt" type="button" data-weapon="sniper">🎯 Sniper</button>
      <button class="wm-opt" type="button" data-weapon="fart">💨 Fart Gun</button>
      <button class="wm-opt" type="button" data-weapon="rocket">🚀 Rocket</button>
      <button class="wm-opt" type="button" data-weapon="fishing_pole">🎣 Fishing Pole</button>
      <button class="wm-opt" type="button" data-weapon="knife">🔪 Knife</button>
      <button class="wm-opt" type="button" data-weapon="grenade_frag">💣 Frag</button>
      <button class="wm-opt" type="button" data-weapon="grenade_impact">💥 Impact</button>
    </div>
  </div>
</div>
